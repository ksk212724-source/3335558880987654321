<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Коннект — мессенджер</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #ffffff;
    --surface: #f4f6fa;
    --surface-2: #ffffff;
    --line: #eaedf2;
    --ink: #0b0b0e;
    --ink-dim: #8e8e93;
    --accent: #2aabee;
    --accent-2: #40a7e3;
    --accent-ink: #ffffff;
    --bubble-me: #effdde;
    --bubble-me-line: #dbf5c3;
    --bubble-them: #ffffff;
    --teal: #4fc65a;
    --radius: 18px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{height:100%; margin:0;}
  body{
    font-family:'Manrope', sans-serif;
    background: var(--bg);
    color: var(--ink);
    overflow:hidden;
  }
  svg{ display:block; }
  #app{ height:100vh; height:100dvh; display:flex; flex-direction:column; position:relative; }

  /* ---------- Screens ---------- */
  .screen{ position:absolute; inset:0; display:flex; flex-direction:column; transition: transform .28s cubic-bezier(.4,0,.2,1); background:var(--bg); }
  #screen-list{ z-index:1; }
  #screen-chat{ transform: translateX(100%); z-index:3; }
  #screen-chat.open{ transform: translateX(0); }

  /* ---------- Tab title header ---------- */
  .tab-header{
    padding: 14px 16px 6px;
    display:flex; align-items:center; justify-content:space-between;
    background: var(--bg);
  }
  .tab-header h1{ font-size:26px; font-weight:800; margin:0; letter-spacing:-.3px; }
  .icon-btn{
    width:38px; height:38px; border-radius:50%; border:none;
    background: var(--surface); display:flex; align-items:center; justify-content:center;
    color: var(--ink); cursor:pointer;
  }

  .search-bar{ padding: 8px 16px 10px; }
  .search-bar .box{
    display:flex; align-items:center; gap:8px;
    background: var(--surface); border-radius: 12px; padding: 9px 14px;
  }
  .search-bar input{
    flex:1; border:none; background:transparent; outline:none;
    font-family:inherit; font-size:14.5px; color:var(--ink);
  }
  .search-bar svg{ color: var(--ink-dim); flex-shrink:0; }

  .chips{ display:flex; gap:8px; padding: 2px 16px 10px; overflow-x:auto; }
  .chip{
    border:none; padding: 8px 16px; border-radius: 20px; font-size:13.5px; font-weight:700;
    background: var(--surface); color: var(--ink); cursor:pointer; white-space:nowrap; flex-shrink:0;
    transition: background .15s, color .15s;
  }
  .chip.active{ background: var(--accent); color:#fff; }

  .avatar{
    width:48px; height:48px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:16px; color:#fff; flex-shrink:0;
    background: linear-gradient(135deg, var(--accent-2), var(--accent));
  }
  .avatar.sm{ width:32px; height:32px; font-size:12px; }

  .list-wrap{ flex:1; overflow-y:auto; padding: 2px 12px 100px; }
  .empty-state{ text-align:center; color:var(--ink-dim); padding: 60px 30px; font-size:14px; line-height:1.6; }
  .empty-state b{ color:var(--ink); display:block; margin-bottom:6px; font-size:17px; font-weight:800;}

  .contact-row{
    display:flex; align-items:center; gap:12px;
    padding: 10px 6px; border-radius: 12px; cursor:pointer;
  }
  .contact-row:active{ background: var(--surface); }
  .contact-row .meta{ flex:1; min-width:0; }
  .row-top{ display:flex; justify-content:space-between; align-items:baseline; }
  .contact-row .name{ font-weight:700; font-size:15.5px; }
  .contact-row .time{ font-size:12px; color:var(--ink-dim); flex-shrink:0; }
  .row-bottom{ display:flex; justify-content:space-between; align-items:center; margin-top:2px; }
  .contact-row .preview{
    font-size:13.5px; color:var(--ink-dim);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; min-width:0;
  }
  .badge{
    background: var(--accent); color:#fff; font-size:11.5px; font-weight:700;
    min-width:20px; height:20px; border-radius:10px; padding:0 6px;
    display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-left:8px;
  }
  .online-dot{
    width:9px; height:9px; border-radius:50%; background: var(--teal); flex-shrink:0; margin-left:8px;
    box-shadow: 0 0 0 2px #fff;
  }

  .fab{
    position:absolute; right:18px; bottom:78px;
    width:56px; height:56px; border-radius:50%;
    background: linear-gradient(135deg, var(--accent-2), var(--accent));
    color: var(--accent-ink); display:flex; align-items:center; justify-content:center;
    border:none; box-shadow: 0 8px 20px rgba(42,171,238,.35); cursor:pointer; z-index:5;
  }

  /* ---------- Bottom nav ---------- */
  .bottom-nav{
    display:flex; border-top:1px solid var(--line); background: var(--bg);
    padding: 6px 4px calc(6px + env(safe-area-inset-bottom));
  }
  .nav-item{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
    border:none; background:none; color: var(--ink-dim); font-size:11px; font-family:inherit;
    padding: 6px 2px; cursor:pointer;
  }
  .nav-item.active{ color: var(--accent); }
  .nav-item svg{ margin: 0 auto; }

  .tab-panel{ display:none; flex:1; min-height:0; flex-direction:column; }
  .tab-panel.active{ display:flex; }

  /* settings */
  .profile-card{ padding: 24px 20px; text-align:center; }
  .profile-card .avatar{ width:84px; height:84px; font-size:28px; margin:0 auto 14px; }
  .profile-card h2{ margin:0 0 2px; font-size:19px; font-weight:800; }
  .profile-card .sub{ color:var(--ink-dim); font-size:13.5px; }
  .info-list{ margin-top: 22px; border-top:1px solid var(--line); }
  .info-row{ display:flex; justify-content:space-between; padding:14px 4px; border-bottom:1px solid var(--line); font-size:14px; }
  .info-row .k{ color:var(--ink-dim); }

  /* ---------- Chat screen ---------- */
  #screen-chat .tab-header{ gap:10px; align-items:center; padding: 12px 12px 12px; border-bottom:1px solid var(--line); }
  .back-btn{ background:none; border:none; color:var(--ink); padding:4px; cursor:pointer; display:flex; }
  .chat-title{ font-weight:700; font-size:15px; }
  .chat-sub{ font-size:12px; color: var(--accent); }

  .messages{ flex:1; overflow-y:auto; padding: 16px 14px 10px; display:flex; flex-direction:column; gap:6px; background: #e9eef1; }
  .bubble{ max-width: 78%; padding: 8px 12px; border-radius: 14px; font-size: 14.5px; line-height:1.4; word-wrap:break-word; box-shadow: 0 1px 1px rgba(0,0,0,.06); }
  .bubble.them{ align-self:flex-start; background: var(--bubble-them); border-bottom-left-radius:4px; }
  .bubble.me{ align-self:flex-end; background: var(--bubble-me); border-bottom-right-radius:4px; }
  .bubble .time{ display:block; font-size:10px; color: var(--ink-dim); margin-top:3px; text-align:right; }
  .day-sep{ align-self:center; font-size:11.5px; color:#fff; background: rgba(0,0,0,.28); padding:4px 12px; border-radius:20px; margin: 10px 0; }

  .composer{ display:flex; align-items:flex-end; gap:8px; padding: 10px 12px calc(12px + env(safe-area-inset-bottom)); border-top:1px solid var(--line); background: var(--bg); }
  .composer textarea{ flex:1; resize:none; max-height:110px; background: var(--surface); color: var(--ink); border:1px solid var(--line); border-radius:20px; padding: 11px 16px; font-family:inherit; font-size:14.5px; outline:none; line-height:1.35; }
  .composer textarea:focus{ border-color: var(--accent); }
  .send-btn{ width:42px; height:42px; border-radius:50%; flex-shrink:0; background: linear-gradient(135deg, var(--accent-2), var(--accent)); border:none; color: var(--accent-ink); cursor:pointer; display:flex; align-items:center; justify-content:center; }

  /* modal */
  .modal-backdrop{ position:fixed; inset:0; background:rgba(0,0,0,.55); display:none; align-items:flex-end; z-index:20; }
  .modal-backdrop.open{ display:flex; }
  .modal{ width:100%; background: #ffffff; border-radius: 16px 16px 0 0; padding: 22px 20px calc(22px + env(safe-area-inset-bottom)); box-shadow: 0 -4px 24px rgba(0,0,0,.08); }
  .modal h3{ margin:0 0 4px; font-size:18px; font-weight:800; }
  .modal p{ color:var(--ink-dim); font-size:13px; margin: 0 0 16px; line-height:1.5;}
  .modal input{ width:100%; background: var(--surface); border:1px solid var(--line); color: var(--ink); border-radius: 12px; padding: 12px 14px; font-size:14.5px; outline:none; font-family:inherit; }
  .modal input:focus{ border-color: var(--accent); }
  .modal-actions{ display:flex; gap:10px; margin-top:16px; }
  .btn{ flex:1; padding: 12px; border-radius: 12px; border:none; font-weight:700; font-size:14px; cursor:pointer; font-family:inherit; }
  .btn.primary{ background: linear-gradient(135deg, var(--accent-2), var(--accent)); color: #fff; }
  .btn.ghost{ background: var(--surface); color: var(--ink); }

  ::-webkit-scrollbar{ width:0; height:0; }
</style>
</head>
<body>
<div id="app">

  <!-- LIST SCREEN -->
  <div class="screen" id="screen-list">

    <!-- CHATS TAB -->
    <div class="tab-panel active" data-panel="chats">
      <header class="tab-header">
        <h1>Чаты</h1>
        <button class="icon-btn" id="search-toggle">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>

      <div class="search-bar" id="search-bar" style="display:none;">

          <div class="info-row"><span class="k">Telegram ID</span><span id="settings-id">—</span></div>
          <div class="info-row"><span class="k">Статус</span><span>в сети</span></div>

      <button class="nav-item active" data-tab="chats">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a8.5 8.5 0 0 1-8.5 8.5 8.4 8.4 0 0 1-4-1L3 21l1.5-5.5A8.4 8.4 0 0 1 3.5 12 8.5 8.5 0 0 1 12 3.5 8.5 8.5 0 0 1 21 12Z"/></svg>
        Чаты
      </button>
      <button class="nav-item" data-tab="calls">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3.1-8.6A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .3 2 .7 2.9a2 2 0 0 1-.4 2.1L8 10a16 16 0 0 0 6 6l1.3-1.4a2 2 0 0 1 2.1-.4c.9.4 1.9.6 2.9.7a2 2 0 0 1 1.7 2Z"/></svg>

  <!-- CHAT SCREEN -->

<script>
// ---------------------------------------------------------------
// CONFIG
// ---------------------------------------------------------------
const SUPABASE_URL = "https://owfaqphmltmfxoipmrik.supabase.co";
const SUPABASE_KEY = "sb_publishable_PcOp8ucb6sLTWE1lbJV8Fg_zwB6A4zI";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const tgUser = tg?.initDataUnsafe?.user;
const ME = {
  id: String(tgUser?.id || "guest_" + Math.floor(Math.random()*100000)),
  first_name: tgUser?.first_name || "Гость",
  username: tgUser?.username || null,
  photo_url: tgUser?.photo_url || null
};

function initials(name){ return (name||"?").trim().slice(0,1).toUpperCase(); }
function hueFor(id){ let h=0; for (const c of String(id)) h=(h*31+c.charCodeAt(0))%360; return h; }
function avatarStyle(id){ const h=hueFor(id); return `background:linear-gradient(135deg, hsl(${h} 60% 55%), hsl(${(h+40)%360} 65% 65%)); color:#fff;`; }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function localStorageSafe(key){ try { return localStorage.getItem(key); } catch(e){ return null; } }
function localStorageSetSafe(key, val){ try { localStorage.setItem(key, val); } catch(e){} }
function chatIdFor(a,b){ return [String(a), String(b)].sort().join('__'); }

document.getElementById('settings-name').textContent = ME.first_name;
document.getElementById('settings-username').textContent = ME.username ? '@'+ME.username : 'без username';
document.getElementById('settings-id').textContent = ME.id;
document.getElementById('settings-avatar').textContent = initials(ME.first_name);
document.getElementById('settings-avatar').setAttribute('style', avatarStyle(ME.id));

// ---------------------------------------------------------------
// PRESENCE
// ---------------------------------------------------------------
async function upsertMe(){
  await sb.from('users').upsert({
    id: ME.id, username: ME.username, first_name: ME.first_name,
    photo_url: ME.photo_url, last_seen: new Date().toISOString()
  });
}
upsertMe();
setInterval(upsertMe, 30000);

// ---------------------------------------------------------------
// STATE
// ---------------------------------------------------------------
let contactsData = [];
let activeChat = null;
let msgChannel = null;
let currentFilter = 'all';
let searchQuery = '';

function addKnownContact(id){
  const known = new Set(JSON.parse(localStorageSafe('drift_contacts') || '[]'));
  known.add(String(id));
  localStorageSetSafe('drift_contacts', JSON.stringify(Array.from(known)));
}
function getReadTs(chatId){ return localStorageSafe('read_'+chatId) || '1970-01-01T00:00:00Z'; }
function setReadNow(chatId){ localStorageSetSafe('read_'+chatId, new Date().toISOString()); }

// ---------------------------------------------------------------
// LOAD CONTACTS + LAST MESSAGE + UNREAD COUNT
// ---------------------------------------------------------------
async function loadContacts(){
  const known = new Set(JSON.parse(localStorageSafe('drift_contacts') || '[]'));

  const { data: sent } = await sb.from('messages').select('chat_id').eq('sender_id', ME.id);
  const { data: recv } = await sb.from('messages').select('chat_id, sender_id').neq('sender_id', ME.id);
  (sent||[]).forEach(r => { const o = r.chat_id.split('__').find(x=>x!==ME.id); if(o) known.add(o); });
  (recv||[]).forEach(r => { if (r.chat_id.includes(ME.id)) known.add(r.sender_id); });

  if (known.size === 0){ contactsData = []; renderAll(); return; }

  const ids = Array.from(known);
  const { data: users } = await sb.from('users').select('*').in('id', ids);
  const chatIds = ids.map(id => chatIdFor(ME.id, id));
  const { data: msgs } = await sb.from('messages').select('*').in('chat_id', chatIds).order('created_at', { ascending:true });

  contactsData = (users||[]).map(u => {
    const cid = chatIdFor(ME.id, u.id);
    const chatMsgs = (msgs||[]).filter(m => m.chat_id === cid);
    const last = chatMsgs[chatMsgs.length-1];
    const readTs = getReadTs(cid);
    const unread = chatMsgs.filter(m => m.sender_id !== ME.id && m.created_at > readTs).length;
    return { ...u, _last: last, _unread: unread };
  });

  renderAll();
}

function renderAll(){
  renderContacts(document.getElementById('contacts'), true);
  renderContacts(document.getElementById('contacts-list-2'), false);
}

function filteredContacts(){
  let list = contactsData.slice();
  if (searchQuery){
    const q = searchQuery.toLowerCase();
    list = list.filter(u => (u.first_name||'').toLowerCase().includes(q) || (u.username||'').toLowerCase().includes(q));
  }
  return list;
}

function renderContacts(wrap, withPreview){
  if (!wrap) return;
  wrap.innerHTML = '';

  if (currentFilter === 'groups' || currentFilter === 'channels'){
    wrap.innerHTML = `<div class="empty-state"><b>Скоро здесь появятся ${currentFilter==='groups'?'группы':'каналы'}</b>Пока доступны только личные переписки.</div>`;
    return;
  }

  const list = filteredContacts();
  if (!list.length){
    wrap.innerHTML = `<div class="empty-state"><b>Пока тихо</b>Нажмите «+», чтобы найти друга по username или ID и начать первый разговор.</div>`;
    return;
  }
  list.sort((a,b) => {
    const ta = a._last?.created_at || a.last_seen || 0;
    const tb = b._last?.created_at || b.last_seen || 0;
    return new Date(tb) - new Date(ta);
  });
  list.forEach(u => {
    const row = document.createElement('div');
    row.className = 'contact-row';
    const online = (Date.now() - new Date(u.last_seen||0).getTime()) < 60000;
    const timeStr = u._last ? new Date(u._last.created_at).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'}) : '';
    const preview = withPreview ? (u._last ? escapeHtml(u._last.text) : (u.username ? '@'+u.username : 'ID: '+u.id)) : (u.username ? '@'+u.username : 'ID: '+u.id);
    row.innerHTML = `
      <div class="avatar" style="${avatarStyle(u.id)}">${initials(u.first_name)}</div>
      <div class="meta">
        <div class="row-top">
          <div class="name">${escapeHtml(u.first_name || u.username || u.id)}</div>
          ${withPreview && timeStr ? `<div class="time">${timeStr}</div>` : ''}
        </div>
        <div class="row-bottom">
          <div class="preview">${preview}</div>
          ${withPreview && u._unread ? `<div class="badge">${u._unread}</div>` : (!withPreview && online ? '<div class="online-dot"></div>' : '')}
        </div>
      </div>
    `;
    row.onclick = () => openChat(u);
    wrap.appendChild(row);
  });
}

// ---------------------------------------------------------------
// SEARCH + FILTER CHIPS
// ---------------------------------------------------------------
document.getElementById('search-toggle').onclick = () => {
  const bar = document.getElementById('search-bar');
  bar.style.display = bar.style.display === 'none' ? 'block' : 'none';
  if (bar.style.display === 'block') document.getElementById('search-input').focus();
};
document.getElementById('search-input').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderAll();
});
document.querySelectorAll('.chip').forEach(chip => {
  chip.onclick = () => {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentFilter = chip.dataset.filter;
    renderAll();
  };
});

// ---------------------------------------------------------------
// BOTTOM NAV TABS
// ---------------------------------------------------------------
document.querySelectorAll('.nav-item').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.querySelector(`.tab-panel[data-panel="${btn.dataset.tab}"]`).classList.add('active');
  };
});

// ---------------------------------------------------------------
// FIND / ADD CONTACT
// ---------------------------------------------------------------
function openModal(){
  document.getElementById('modal-backdrop').classList.add('open');
  document.getElementById('find-input').value = '';
  document.getElementById('find-results').innerHTML = '';
}
document.getElementById('fab-add').onclick = openModal;
document.getElementById('fab-add-2').onclick = openModal;
document.getElementById('modal-cancel').onclick = () => document.getElementById('modal-backdrop').classList.remove('open');
document.getElementById('modal-find').onclick = async () => {
  const q = document.getElementById('find-input').value.trim().replace(/^@/, '');
  const resultsEl = document.getElementById('find-results');
  if (!q) return;
  resultsEl.innerHTML = '<p style="margin-top:12px;">Ищу...</p>';
  const { data } = await sb.from('users').select('*').or(`id.eq.${q},username.ilike.${q}`).limit(5);
  const found = (data||[]).filter(u => u.id !== ME.id);
  if (!found.length){
    resultsEl.innerHTML = '<p style="margin-top:12px;">Никого не нашлось. Пусть друг откроет это приложение хотя бы раз — тогда он появится здесь.</p>';
    return;
  }
  resultsEl.innerHTML = '';
  found.forEach(u => {
    const row = document.createElement('div');
    row.className = 'contact-row';
    row.style.marginTop = '10px';
    row.innerHTML = `
      <div class="avatar" style="${avatarStyle(u.id)}">${initials(u.first_name)}</div>
      <div class="meta">
        <div class="name">${escapeHtml(u.first_name || u.id)}</div>
        <div class="preview">${u.username ? '@'+u.username : 'ID: '+u.id}</div>
      </div>`;
    row.onclick = () => {
      addKnownContact(u.id);
      document.getElementById('modal-backdrop').classList.remove('open');
      loadContacts().then(() => openChat(u));
    };
    resultsEl.appendChild(row);
  });
};

// ---------------------------------------------------------------
// CHAT SCREEN
// ---------------------------------------------------------------
async function openChat(contact){
  activeChat = contact;
  addKnownContact(contact.id);
  setReadNow(chatIdFor(ME.id, contact.id));
  document.getElementById('chat-title').textContent = contact.first_name || contact.username || contact.id;
  const online = (Date.now() - new Date(contact.last_seen||0).getTime()) < 60000;
  document.getElementById('chat-sub').textContent = online ? 'в сети' : 'не в сети';
  document.getElementById('chat-avatar').setAttribute('style', avatarStyle(contact.id));
  document.getElementById('chat-avatar').textContent = initials(contact.first_name);
  document.getElementById('screen-chat').classList.add('open');
  tg?.BackButton?.show();
  await loadMessages();
  subscribeToChat();
}

function closeChat(){
  document.getElementById('screen-chat').classList.remove('open');
  tg?.BackButton?.hide();
  if (msgChannel){ sb.removeChannel(msgChannel); msgChannel = null; }
  activeChat = null;
  loadContacts();
}
document.getElementById('back-btn').onclick = closeChat;
tg?.BackButton?.onClick(closeChat);

async function loadMessages(){
  const cid = chatIdFor(ME.id, activeChat.id);
  const { data } = await sb.from('messages').select('*').eq('chat_id', cid).order('created_at', { ascending: true });
  renderMessages(data || []);
}

function renderMessages(list){
  const wrap = document.getElementById('messages');
  wrap.innerHTML = '';
  let lastDay = null;
  list.forEach(m => {
    const d = new Date(m.created_at);
    const dayKey = d.toDateString();
    if (dayKey !== lastDay){
      lastDay = dayKey;
      const sep = document.createElement('div');
      sep.className = 'day-sep';
      sep.textContent = d.toLocaleDateString('ru-RU', { day:'numeric', month:'long' });
      wrap.appendChild(sep);
    }
    appendBubble(wrap, m);
  });
  wrap.scrollTop = wrap.scrollHeight;
}

function appendBubble(wrap, m){
  const b = document.createElement('div');
  b.className = 'bubble ' + (m.sender_id === ME.id ? 'me' : 'them');
  const d = new Date(m.created_at);
  b.innerHTML = `${escapeHtml(m.text)}<span class="time">${d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})}</span>`;
  wrap.appendChild(b);
}

function subscribeToChat(){
  if (msgChannel){ sb.removeChannel(msgChannel); }
  const cid = chatIdFor(ME.id, activeChat.id);
  msgChannel = sb.channel('room_' + cid)
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'messages', filter:`chat_id=eq.${cid}` }, payload => {
      const wrap = document.getElementById('messages');
      appendBubble(wrap, payload.new);
      wrap.scrollTop = wrap.scrollHeight;
      if (payload.new.sender_id !== ME.id) setReadNow(cid);
    })
    .subscribe();
}

// ---------------------------------------------------------------
// SEND MESSAGE
// ---------------------------------------------------------------
const input = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');
input.addEventListener('input', () => { input.style.height='auto'; input.style.height = Math.min(input.scrollHeight,110)+'px'; });
input.addEventListener('keydown', e => { if (e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); } });
sendBtn.onclick = sendMessage;

async function sendMessage(){
  const text = input.value.trim();
  if (!text || !activeChat) return;
  input.value = ''; input.style.height='auto';
  const cid = chatIdFor(ME.id, activeChat.id);
  await sb.from('messages').insert({ chat_id: cid, sender_id: ME.id, sender_name: ME.first_name, text });
  tg?.HapticFeedback?.impactOccurred('light');
}

// ---------------------------------------------------------------
// TELEGRAM THEME SYNC
// ---------------------------------------------------------------
function applyTelegramTheme(){
  const t = tg?.themeParams;
  if (!t) return;
  const root = document.documentElement.style;
  if (t.bg_color)           root.setProperty('--bg', t.bg_color);
  if (t.secondary_bg_color) root.setProperty('--surface', t.secondary_bg_color);
  if (t.text_color)         root.setProperty('--ink', t.text_color);
  if (t.hint_color)         root.setProperty('--ink-dim', t.hint_color);
  if (t.button_color)       { root.setProperty('--accent', t.button_color); root.setProperty('--accent-2', t.button_color); }
  if (t.button_text_color)  root.setProperty('--accent-ink', t.button_text_color);
  if (t.link_color)         root.setProperty('--teal', t.link_color);
}
applyTelegramTheme();
tg?.onEvent?.('themeChanged', applyTelegramTheme);

// ---------------------------------------------------------------
// BOOT
// ---------------------------------------------------------------
loadContacts();
setInterval(() => { if (!activeChat) loadContacts(); }, 8000);
</script>
